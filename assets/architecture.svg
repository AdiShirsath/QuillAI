<svg width="860" height="840" viewBox="0 0 860 840" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .label-main { font-size: 13px; font-weight: 600; }
      .label-sub  { font-size: 11px; }
      .section-label { font-size: 10px; letter-spacing: 1.5px; }
    </style>
  </defs>

  <!-- background -->
  <rect width="860" height="840" fill="#0f172a" rx="12"/>

  <!-- ── ROW 1: USER INPUTS ── -->
  <!-- CSV box -->
  <rect x="70" y="36" width="150" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="145" y="60" text-anchor="middle" fill="#f1f5f9" class="label-main">CSV / Excel</text>
  <text x="145" y="78" text-anchor="middle" fill="#64748b" class="label-sub">Upload file</text>

  <!-- Goal box -->
  <rect x="270" y="36" width="160" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="350" y="60" text-anchor="middle" fill="#f1f5f9" class="label-main">Analysis goal</text>
  <text x="350" y="78" text-anchor="middle" fill="#64748b" class="label-sub">Natural language</text>

  <!-- arrows → FastAPI -->
  <line x1="145" y1="92" x2="240" y2="134" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="350" y1="92" x2="350" y2="134" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── ROW 2: FASTAPI + REDIS ── -->
  <!-- FastAPI -->
  <rect x="180" y="134" width="210" height="56" rx="8" fill="#0c1829" stroke="#185fa5" stroke-width="1"/>
  <text x="285" y="158" text-anchor="middle" fill="#93c5fd" class="label-main">FastAPI server</text>
  <text x="285" y="176" text-anchor="middle" fill="#3b82f6" class="label-sub">REST + WebSocket</text>

  <!-- Redis -->
  <rect x="470" y="134" width="190" height="56" rx="8" fill="#042f2e" stroke="#0f6e56" stroke-width="1"/>
  <text x="565" y="158" text-anchor="middle" fill="#5eead4" class="label-main">Redis</text>
  <text x="565" y="176" text-anchor="middle" fill="#0d9488" class="label-sub">Tasks · files · working memory</text>

  <!-- FastAPI ↔ Redis -->
  <line x1="390" y1="162" x2="470" y2="162" stroke="#10b981" stroke-width="1" marker-end="url(#arrow-green)"/>

  <!-- FastAPI → Agent -->
  <line x1="285" y1="190" x2="285" y2="220" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── AGENT CONTAINER ── -->
  <rect x="50" y="220" width="680" height="444" rx="12" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="70" y="242" fill="#334155" class="section-label">AGENT CORE</text>

  <!-- ── PLANNER ── -->
  <rect x="180" y="254" width="210" height="56" rx="8" fill="#2d1b69" stroke="#7c3aed" stroke-width="1"/>
  <text x="285" y="278" text-anchor="middle" fill="#c4b5fd" class="label-main">Planner</text>
  <text x="285" y="296" text-anchor="middle" fill="#7c3aed" class="label-sub">GPT-4 · ordered step plan</text>

  <!-- Episodic memory -->
  <rect x="490" y="254" width="160" height="56" rx="8" fill="#2d1b69" stroke="#7c3aed" stroke-width="1"/>
  <text x="570" y="278" text-anchor="middle" fill="#c4b5fd" class="label-main">Episodic memory</text>
  <text x="570" y="296" text-anchor="middle" fill="#7c3aed" class="label-sub">ChromaDB · past tasks</text>

  <!-- Planner ↔ Episodic -->
  <line x1="390" y1="282" x2="490" y2="282" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrow-purple)"/>

  <!-- Planner → Executor -->
  <line x1="285" y1="310" x2="285" y2="340" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── EXECUTOR ── -->
  <rect x="180" y="340" width="210" height="56" rx="8" fill="#0c1829" stroke="#185fa5" stroke-width="1"/>
  <text x="285" y="364" text-anchor="middle" fill="#93c5fd" class="label-main">Executor</text>
  <text x="285" y="382" text-anchor="middle" fill="#3b82f6" class="label-sub">Runs one step at a time</text>

  <!-- Executor → Code writer -->
  <line x1="180" y1="368" x2="110" y2="426" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Executor → Thinker -->
  <line x1="390" y1="368" x2="470" y2="426" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── CODE WRITER ── -->
  <rect x="60" y="426" width="130" height="56" rx="8" fill="#3b1a0a" stroke="#d97706" stroke-width="1"/>
  <text x="125" y="450" text-anchor="middle" fill="#fcd34d" class="label-main">Code writer</text>
  <text x="125" y="468" text-anchor="middle" fill="#d97706" class="label-sub">GPT-4 writes Python</text>

  <!-- ── THINKER ── -->
  <rect x="468" y="426" width="160" height="56" rx="8" fill="#3b1a0a" stroke="#d97706" stroke-width="1"/>
  <text x="548" y="450" text-anchor="middle" fill="#fcd34d" class="label-main">Thinker</text>
  <text x="548" y="468" text-anchor="middle" fill="#d97706" class="label-sub">THINK · ANALYZE · SUMMARIZE</text>

  <!-- Code writer → Sandbox -->
  <line x1="125" y1="482" x2="125" y2="512" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── SANDBOX ── -->
  <rect x="60" y="512" width="130" height="56" rx="8" fill="#1a1200" stroke="#b45309" stroke-width="1"/>
  <text x="125" y="536" text-anchor="middle" fill="#fbbf24" class="label-main">Sandbox</text>
  <text x="125" y="554" text-anchor="middle" fill="#b45309" class="label-sub">AST check · exec</text>

  <!-- Sandbox → Self-correct -->
  <line x1="125" y1="568" x2="125" y2="598" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── SELF CORRECT ── -->
  <rect x="60" y="598" width="130" height="56" rx="8" fill="#1a1200" stroke="#b45309" stroke-width="1"/>
  <text x="125" y="622" text-anchor="middle" fill="#fbbf24" class="label-main">Self-correct</text>
  <text x="125" y="640" text-anchor="middle" fill="#b45309" class="label-sub">Fix error · retry ×3</text>

  <!-- retry arc -->
  <path d="M60 626 L34 626 L34 540 L60 540" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="30" y="584" text-anchor="middle" fill="#475569" font-size="16">↻</text>

  <!-- both branches → interpreter -->
  <line x1="190" y1="636" x2="248" y2="672" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="548" y1="482" x2="360" y2="672" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── INTERPRETER ── -->
  <rect x="180" y="672" width="210" height="56" rx="8" fill="#0c1829" stroke="#185fa5" stroke-width="1"/>
  <text x="285" y="696" text-anchor="middle" fill="#93c5fd" class="label-main">Interpreter</text>
  <text x="285" y="714" text-anchor="middle" fill="#3b82f6" class="label-sub">Findings · confidence · figures</text>

  <!-- Interpreter → learns episodic (dashed arc) -->
  <path d="M390 700 L570 700 L570 310" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="590" y="505" fill="#475569" font-size="10">learns</text>

  <!-- Interpreter → replan -->
  <line x1="285" y1="728" x2="285" y2="756" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── REPLAN CHECK ── -->
  <rect x="180" y="756" width="210" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="285" y="780" text-anchor="middle" fill="#f1f5f9" class="label-main">Replan check</text>
  <text x="285" y="798" text-anchor="middle" fill="#64748b" class="label-sub">2+ failures or confidence &lt; 0.3</text>

  <!-- replan → back to planner (left arc) -->
  <path d="M180 784 L68 784 L68 282 L180 282" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="54" y="533" fill="#475569" font-size="10" text-anchor="middle">replan</text>

  <!-- agent container end -->

  <!-- replan → outputs -->
  <line x1="285" y1="812" x2="285" y2="840" stroke="#64748b" stroke-width="1"/>
  <line x1="285" y1="840" x2="140" y2="840" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="285" y1="840" x2="430" y2="840" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── EVALUATOR ── -->
  <rect x="60" y="756" width="110" height="56" rx="8" fill="#022c22" stroke="#059669" stroke-width="1"/>
  <text x="115" y="780" text-anchor="middle" fill="#6ee7b7" class="label-main">Evaluator</text>
  <text x="115" y="798" text-anchor="middle" fill="#059669" class="label-sub">7 quality metrics</text>

  <!-- connect replan → evaluator -->
  <line x1="180" y1="784" x2="170" y2="784" stroke="#334155" stroke-width="0.5"/>

  <!-- ── FINAL REPORT ── -->
  <rect x="430" y="756" width="140" height="56" rx="8" fill="#022c22" stroke="#059669" stroke-width="1"/>
  <text x="500" y="780" text-anchor="middle" fill="#6ee7b7" class="label-main">Final report</text>
  <text x="500" y="798" text-anchor="middle" fill="#059669" class="label-sub">Summary · findings</text>

</svg>
