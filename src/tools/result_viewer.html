<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuillAI — Result Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');

  :root {
    --bg: #050810;
    --surface: #0c1018;
    --surface2: #111827;
    --border: #1f2937;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --accent: #3b82f6;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px;
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    margin-bottom: 4px; letter-spacing: -0.5px;
  }
  .subtitle { font-size: 11px; color: var(--text3); margin-bottom: 28px; }

  /* ── INPUT AREA ── */
  .input-section { margin-bottom: 24px; }
  .input-label { font-size: 9px; letter-spacing: 2px; color: var(--text3); margin-bottom: 8px; }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    resize: vertical;
    min-height: 140px;
    transition: border-color 0.2s;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .btn-row { display: flex; gap: 10px; margin-top: 10px; }

  button {
    padding: 10px 20px;
    border: none; border-radius: 7px;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #1d4ed8, #7c3aed);
    color: #fff;
    box-shadow: 0 0 16px #3b82f622;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 24px #3b82f644; }
  .btn-clear {
    background: var(--surface2);
    color: var(--text3);
    border: 1px solid var(--border);
  }
  .btn-clear:hover { color: var(--text2); }

  .error-msg {
    color: var(--red); font-size: 12px;
    background: #1a0505; border: 1px solid #7f1d1d;
    border-radius: 7px; padding: 10px 14px;
    margin-top: 10px; display: none;
  }

  /* ── RESULT ── */
  #result { display: none; }

  /* Stats */
  .stats-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-box {
    flex: 1; min-width: 90px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; text-align: center;
  }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 4px; }
  .stat-lbl { font-size: 9px; color: var(--text3); letter-spacing: 1px; }

  /* Summary */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; margin-bottom: 16px;
  }
  .card-title {
    font-size: 9px; letter-spacing: 2px; color: var(--text3);
    margin-bottom: 12px;
  }
  .summary-text {
    font-family: 'Lora', serif;
    font-size: 15px; color: var(--text2); line-height: 1.75;
  }

  /* Findings */
  .finding-row {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .finding-row:last-child { border-bottom: none; }
  .finding-num { color: var(--accent); font-size: 11px; font-weight: 700; min-width: 18px; }
  .finding-text { font-family: 'Lora', serif; font-size: 13px; color: var(--text2); line-height: 1.55; }

  /* Body text */
  .body-text {
    font-family: 'Lora', serif;
    font-size: 13px; color: var(--text2); line-height: 1.8;
  }

  /* Limitations */
  .limitation {
    display: flex; gap: 8px; align-items: flex-start;
    padding: 6px 0; font-size: 12px; color: var(--yellow);
  }

  /* Figures */
  .figures-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px; margin-bottom: 16px;
  }
  .figure-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .figure-img   { width: 100%; display: block; background: #fff; }
  .figure-label { padding: 8px 12px; font-size: 10px; color: var(--text3); }

  /* Status badge */
  .status-badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 10px; letter-spacing: 1px; font-weight: 600;
    margin-bottom: 20px;
  }
  .status-completed { background: #022c22; color: var(--green); border: 1px solid #059669; }
  .status-error     { background: #1a0505; color: var(--red);   border: 1px solid #dc2626; }
  .status-running   { background: #0c1829; color: var(--accent); border: 1px solid var(--accent); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<h1>⚡ DataWright — Result Viewer</h1>
<p class="subtitle">Paste JSON from GET /task/{task_id} and click Render</p>

<!-- Input -->
<div class="input-section">
  <div class="input-label">PASTE JSON OUTPUT</div>
  <textarea id="jsonInput" placeholder='Paste the full JSON response from GET /task/{task_id} here...'></textarea>
  <div class="error-msg" id="errorMsg"></div>
  <div class="btn-row">
    <button class="btn-primary" onclick="render()">▶ Render Result</button>
    <button class="btn-clear" onclick="clearAll()">✕ Clear</button>
  </div>
</div>

<!-- Output -->
<div id="result"></div>

<script>
function render() {
  const raw = document.getElementById('jsonInput').value.trim()
  const err = document.getElementById('errorMsg')
  err.style.display = 'none'

  if (!raw) {
    showError('Paste your JSON first')
    return
  }

  let data
  try {
    data = JSON.parse(raw)
  } catch(e) {
    showError(`Invalid JSON: ${e.message}`)
    return
  }

  // The endpoint returns the full task object
  // result lives inside data.result for async, or directly for sync
  const result = data.result || data
  const status = data.status || 'completed'

  const out = document.getElementById('result')
  out.style.display = 'block'
  out.innerHTML = buildHTML(result, status)
}

function buildHTML(r, status) {
  const conf      = r.confidence_score || 0
  const confColor = conf > 0.8 ? 'var(--green)' : conf > 0.6 ? 'var(--yellow)' : 'var(--red)'
  const latency   = ((r.total_latency_ms || 0) / 1000).toFixed(1)
  const figures   = r.figures || []
  const findings  = r.key_findings || []
  const limits    = r.limitations || []

  let html = ''

  // Status badge
  html += `<div class="status-badge status-${status}">${status.toUpperCase()}</div>`

  // Stats
  html += `
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val">${r.steps_taken || 0}</div>
        <div class="stat-lbl">STEPS</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${r.self_corrections || 0}</div>
        <div class="stat-lbl">CORRECTIONS</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:${confColor}">${Math.round(conf * 100)}%</div>
        <div class="stat-lbl">CONFIDENCE</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${latency}s</div>
        <div class="stat-lbl">TIME</div>
      </div>
    </div>`

  // Summary
  if (r.executive_summary) {
    html += `
      <div class="card">
        <div class="card-title">EXECUTIVE SUMMARY</div>
        <div class="summary-text">${r.executive_summary}</div>
      </div>`
  }

  // Key findings
  if (findings.length) {
    html += `<div class="card">
      <div class="card-title">KEY FINDINGS (${findings.length})</div>`
    findings.forEach((f, i) => {
      html += `<div class="finding-row">
        <div class="finding-num">${i + 1}</div>
        <div class="finding-text">${f}</div>
      </div>`
    })
    html += `</div>`
  }

  // Detailed analysis
  if (r.detailed_analysis) {
    html += `
      <div class="card">
        <div class="card-title">DETAILED ANALYSIS</div>
        <div class="body-text">${r.detailed_analysis.replace(/\n/g, '<br>')}</div>
      </div>`
  }

  // Methodology
  if (r.methodology) {
    html += `
      <div class="card">
        <div class="card-title">METHODOLOGY</div>
        <div class="body-text">${r.methodology}</div>
      </div>`
  }

  // Limitations
  if (limits.length) {
    html += `<div class="card">
      <div class="card-title">LIMITATIONS</div>`
    limits.forEach(l => {
      html += `<div class="limitation">⚠ ${l}</div>`
    })
    html += `</div>`
  }

  // Figures
  if (figures.length) {
    html += `<div class="card">
      <div class="card-title">FIGURES (${figures.length})</div>
      <div class="figures-grid">`
    figures.forEach((fig, i) => {
      html += `<div class="figure-card">
        <img class="figure-img" src="data:image/png;base64,${fig}" alt="Figure ${i+1}">
        <div class="figure-label">Figure ${i + 1}</div>
      </div>`
    })
    html += `</div></div>`
  }

  return html
}

function showError(msg) {
  const err = document.getElementById('errorMsg')
  err.textContent = msg
  err.style.display = 'block'
}

function clearAll() {
  document.getElementById('jsonInput').value = ''
  document.getElementById('result').style.display = 'none'
  document.getElementById('result').innerHTML = ''
  document.getElementById('errorMsg').style.display = 'none'
}
</script>
</body>
</html>
